services:
  app:
    build:
      context: ./php
    container_name: bepurposed_php
    ports:
      - "8081:80"
    volumes:
      - ./public:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bepurposed_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bepurposed_db
      MYSQL_USER: bepurposed_user
      MYSQL_PASSWORD: bepurposed_pass
    ports:
      - "3307:3306"
    volumes:
      - bepurposed_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bepurposed_phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  bepurposed_mysql_data: