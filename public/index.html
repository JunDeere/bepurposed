<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BePurposed Homepage Demos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f7efe9;
            color: #2e1f1b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            max-width: 760px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        p {
            font-size: 18px;
            color: #6b514a;
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            padding: 14px 24px;
            border-radius: 999px;
            background: #5b2f29;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        a.secondary {
            background: transparent;
            color: #5b2f29;
            border: 1px solid #5b2f29;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>BePurposed Homepage Demos</h1>
        <p>Select a homepage version to preview.</p>

        <div class="links">
            <a href="v1.html">View Homepage V1</a>
            <a href="v2.html" class="secondary">View Homepage V2</a>
        </div>
    </main>
</body>
</html>
